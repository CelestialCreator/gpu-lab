apiVersion: batch/v1
kind: Job
metadata:
  name: turboquant-kv-analysis
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: kv-analysis
        image: localhost:5000/grpo-reasoning:latest
        imagePullPolicy: Always
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -ex

          echo "=== GPU info ==="
          python3 -c "import torch; print(f'GPU: {torch.cuda.get_device_name(0)}, VRAM: {torch.cuda.get_device_properties(0).total_mem/1e9:.1f}GB')"

          # Install scipy (needed for Lloyd-Max quantizer)
          pip install scipy -q

          echo "=== Running TurboQuant KV cache analysis ==="
          python3 -u /opt/scripts/kv_cache_analysis.py

          echo "=== Done ==="
        env:
        - name: HF_TOKEN
          value: "${HF_TOKEN}"
        - name: HF_HOME
          value: /workspace/hf_cache
        - name: NVIDIA_VISIBLE_DEVICES
          value: ${GPU_UUID}
        resources:
          requests:
            memory: 6Gi
            nvidia.com/gpu: "1"
          limits:
            memory: 8Gi
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: scripts
          mountPath: /opt/scripts
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: workspace
        hostPath:
          path: /home/akshay/grpo-workspace
          type: DirectoryOrCreate
      - name: scripts
        hostPath:
          path: /home/akshay/gpu-lab/projects/06-turboquant/scripts
          type: Directory
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
